services:
  # React Frontend Service
  frontend:
    build: ./frontend
    container_name: doc-analyzer-frontend
    ports:
      - "80:80"
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - doc-analyzer-network

  # FastAPI Backend Service
  fastapi:
    build: .
    container_name: doc-analyzer-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - doc-analyzer-network

networks:
  doc-analyzer-network:
    driver: bridge

volumes:
  uploads:
  reports:
  data:
